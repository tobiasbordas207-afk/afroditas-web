<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Afroditas Lencería</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fff5f8;
}

/* HEADER */
header{
    background:#ff3d7f;
    color:white;
    text-align:center;
    padding:20px;
}

/* HERO */
.hero{
    text-align:center;
    padding:40px;
    background:linear-gradient(90deg,#ff6fa1,#ff3d7f);
    color:white;
}

/* BOTONES FILTRO */
.filtros{
    text-align:center;
    margin:20px;
}

.filtros button{
    margin:5px;
    padding:10px 15px;
    border:none;
    background:#ff3d7f;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* CONTENEDOR GENERAL */
.contenedor{
    display:flex;
}

/* PRODUCTOS */
.productos{
    flex:3;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    margin:10px 0;
}

.card p{
    color:#ff3d7f;
    font-weight:bold;
}

.card button{
    margin:5px;
    padding:8px;
    width:80%;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#ff3d7f;
    color:white;
}

/* CARRITO */
.carrito{
    flex:1;
    background:white;
    padding:15px;
    border-left:2px solid #ffd1e0;
    position:sticky;
    top:0;
    height:100vh;
    overflow:auto;
}

.item{
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.total{
    font-weight:bold;
    color:#ff3d7f;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>Afroditas Lencería</h1>
</header>

<section class="hero">
<h2>Tu tienda divina ✨</h2>
</section>

<section class="filtros">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('conjuntos')">Conjuntos</button>
<button onclick="filtrar('bombachas')">Bombachas</button>
</section>

<div class="contenedor">

<!-- PRODUCTOS -->
<section class="productos">

<div class="card conjuntos">
<img src="milan.jpeg">
<h3>Conjunto Milan</h3>
<p>$8000</p>
<button onclick="agregar('Conjunto Milan',8000)">Agregar</button>
</div>

<div class="card conjuntos">
<img src="basic.jpeg">
<h3>Conjunto Basic</h3>
<p>$6000</p>
<button onclick="agregar('Conjunto Basic',6000)">Agregar</button>
</div>

<div class="card bombachas">
<img src="vedetina.jpeg">
<h3>Vedetina</h3>
<p>$3000</p>
<button onclick="agregar('Vedetina',3000)">Agregar</button>
</div>

<div class="card bombachas">
<img src="colaless.jpeg">
<h3>Colaless</h3>
<p>$3000</p>
<button onclick="agregar('Colaless',3000)">Agregar</button>
</div>

</section>

<!-- CARRITO -->
<aside class="carrito">
<h2>🛒 Carrito</h2>
<div id="carrito"></div>
<div class="total" id="total">Total: $0</div>
</aside>

</div>

<script>

let carrito = [];

/* AGREGAR AL CARRITO (ARREGLADO) */
function agregar(nombre,precio){

    let item = carrito.find(p => p.nombre === nombre);

    if(item){
        item.cantidad++;
    } else {
        carrito.push({nombre,precio,cantidad:1});
    }

    render();
}

/* MOSTRAR CARRITO */
function render(){

    let cont = document.getElementById("carrito");
    cont.innerHTML = "";

    let total = 0;

    carrito.forEach(i=>{
        total += i.precio * i.cantidad;

        cont.innerHTML += `
        <div class="item">
            <b>${i.nombre}</b><br>
            Cantidad: ${i.cantidad}<br>
            Subtotal: $${i.precio * i.cantidad}
        </div>
        `;
    });

    document.getElementById("total").innerText = "Total: $" + total;
}

/* FILTRO (ARREGLADO) */
function filtrar(tipo){

    let productos = document.querySelectorAll(".card");

    productos.forEach(p=>{
        if(tipo === "todos"){
            p.style.display = "block";
        } else {
            p.style.display = p.classList.contains(tipo) ? "block" : "none";
        }
    });
}

</script>

</body>
</html>
